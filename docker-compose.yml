# RenmaeAI v2 — Docker Compose (Development)
services:
  # === PostgreSQL 15 ===
  postgres:
    image: postgres:15-alpine
    container_name: renmaeai-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: renmaeai
      POSTGRES_PASSWORD: renmaeai_dev_2026
      POSTGRES_DB: renmaeai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U renmaeai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis 7 ===
  redis:
    image: redis:7-alpine
    container_name: renmaeai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
